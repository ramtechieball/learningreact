<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>karban board</title>
    <style>
        *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      display:flex;
      justify-content:center;
      background-color: aliceblue;
    }

    .container{
      background-color: white;
      width: 700px;
      padding:30px;
      gap: 30px class="sep";
      border-radius:12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid black;
    }
    #progress{
        width: 100%;
        display: grid;
        grid-template-columns:repeat(3,1fr);
        gap:20px;
        margin-top: 20px;
    }
    #todo,
    #inprogress,
    #done{
      min-height:300px;
      border:1px solid black;
      background-color: burlywood;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .task{
      border:1px solid black;
      padding:10px;
      margin-top: 10px;
      display:flex;
      flex-direction:column;
      gap:10px;
      background-color: aqua;
    }
    .popup{
        height: 300px;
        width: 300px;
        position: fixed;
        display:flex;
        justify-content: center;
        align-items: center;
    }
    .popup-box{
        border: 1px solid black;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background-color: aliceblue;
    }
    .buttons{
      display:flex;
      gap:10px;
    }
    .taskDiv{
        background-color: aquamarine;
    }
    </style>
</head>
<body>
    <div class="container">
        <h1>karban board</h1>
        <div><input id="search" type="text" placeholder="search"> <button id="addbtn">+</button></div>
        <div id="progress" class="sep">
            <div id="todo"><h3>To Do: <span id="count-todo">0</span></h3>
                <div class="todo-tasks"></div>
        </div>
        <div id="inprogress" class="sep"><h3>In Progress: <span id="count-progress">0</span></h3>
            <div class="progress-tasks"></div>
        </div>
        <div id="done" class="sep">
          <h3>Done: <span id="count-done">0</span></h3>
          <div class="done-tasks"></div>
        </div>
        </div>
    </div>
    <script>
        const addbtn=document.getElementById("addbtn");
        const search=document.getElementById("search");
        const todo = document.getElementById("todo");
        const inprogress = document.getElementById("inprogress");
        const done = document.getElementById("done");
        const todoTasks =document.querySelector(".todo-tasks");
        const progressTasks =document.querySelector(".progress-tasks");
        const doneTasks =document.querySelector(".done-tasks");
        const tasks = [];
        addbtn.addEventListener("click", () => {

          const popup = document.createElement("div");
          popup.classList.add("popup");

          popup.innerHTML = `

            <div class="popup-box">
            
              <input type="text" id="taskTitle" placeholder="enter title">
            
              <select id="priority">
                <option value="low">low</option>
                <option value="medium">medium</option>
                <option value="high">high</option>
              </select>
          
              <button id="createTask">Add Task</button>
          
            </div>`;
        
          document.body.appendChild(popup);
        
          document.getElementById("createTask").addEventListener("click", () => {
        
            const title = document.getElementById("taskTitle").value;
            const priority = document.getElementById("priority").value;
        
            if(title === ""){
              document.getElementById("taskTitle").placeholder = "add the title";
              return;
            }
        
            tasks.push({
              name: title,
              priority: priority,
              status: "todo"
            });
            renderTasks(tasks);
            popup.remove();
          });
        }); 
        function renderTasks(Task){
          todoTasks.innerHTML = "";
          progressTasks.innerHTML = "";
          doneTasks.innerHTML = "";

          Task.forEach(task => {
        
            const taskDiv = document.createElement("div");
        
            taskDiv.classList.add("task");
        
            taskDiv.innerHTML = `
              <h3>${task.name}</h3>
              <p>${task.priority}</p>
            `;
        
            const buttonsDiv = document.createElement("div");
            buttonsDiv.classList.add("buttons");
        
            if(task.status === "todo"){
            
              const rightBtn = document.createElement("button");
              rightBtn.innerText = ">";
            
              rightBtn.addEventListener("click", () => {
                task.status = "progress";
                renderTasks(tasks);
              });
          
              buttonsDiv.appendChild(rightBtn);
          
            }
        
            else if(task.status === "progress"){
            
              const leftBtn = document.createElement("button");
              leftBtn.innerText = "<";
            
              leftBtn.addEventListener("click", () => {
                task.status = "todo";
                renderTasks(tasks);
              });
          
              const rightBtn = document.createElement("button");
              rightBtn.innerText = ">";
          
              rightBtn.addEventListener("click", () => {
                task.status = "done";
                renderTasks(tasks);
              });
          
              buttonsDiv.appendChild(leftBtn);
              buttonsDiv.appendChild(rightBtn);
          
            }
        
            else if(task.status === "done"){
            
              const leftBtn = document.createElement("button");
              leftBtn.innerText = "<";
            
              leftBtn.addEventListener("click", () => {
                task.status = "progress";
                renderTasks(tasks);
              });
          
              buttonsDiv.appendChild(leftBtn);
          
            }
        
            const deleteBtn = document.createElement("button");
            deleteBtn.innerText = "X";
        
            deleteBtn.addEventListener("click", () => {
            
              const index = tasks.findIndex(t => t.id === task.id);
            
                tasks.splice(index, 1);
            
              renderTasks(tasks);
            
            });
        
            buttonsDiv.appendChild(deleteBtn);
        
            taskDiv.appendChild(buttonsDiv);
        
            if(task.status === "todo"){
              todoTasks.appendChild(taskDiv);
            }
        
            else if(task.status === "progress"){
              progressTasks.appendChild(taskDiv);
            }
        
            else{
              doneTasks.appendChild(taskDiv);
            }
        
          });
      
          updateCounts();
      
        }
        function updateCounts(){
          document.getElementById("count-todo").innerText =
          tasks.filter(task => task.status === "todo").length;

          document.getElementById("count-progress").innerText =
          tasks.filter(task => task.status === "progress").length;

          document.getElementById("count-done").innerText =
          tasks.filter(task => task.status === "done").length;

        }
        search.addEventListener("input", () => {
          const searchValue =
            search.value.toLowerCase();
          const filtered = tasks.filter(task =>
            task.name
            .toLowerCase()
            .includes(searchValue)
          );
          renderTasks(filtered);
        });
    </script>
</body>
</html>
