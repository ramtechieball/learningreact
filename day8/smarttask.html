<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Task Manager</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      display:flex;
      justify-content:center;
    }

    .container{
      width:700px;
      padding:30px;
      border-radius:12px;
    }


  </style>
</head>

<body>

  <div class="container">

    <h1>Smart Task Manager</h1>
	<p>Total Tasks:<span id="count">0</span></p>

    <div class="top">

      <input type="text" id="taskInput" placeholder="Enter task">
      <button id="addBtn">Add</button>

    </div>

    <input type="text" id="searchInput" placeholder="Search tasks...">
    
    <div id="taskList">
    <p class="empty">No tasks yet. Add one above!</p>
    </div>

    <button class="clear-btn" id="clearBtn">Clear Everything</button>

  </div>

  <script>

    let tasks = [];

    const taskInput  = document.getElementById("taskInput");

    const addBtn     = document.getElementById("addBtn");

    const searchInput= document.getElementById("searchInput");

    const taskList   = document.getElementById("taskList");

    const clearBtn   = document.getElementById("clearBtn");
	const count      = document.getElementById("count");



    function renderTasks(filteredTasks = tasks){
	count.textContent = tasks.length;

    taskList.innerHTML = "";

    if(filteredTasks.length === 0){

        taskList.innerHTML =
        `<p class="empty">No matches found</p>`;

        return;

    }

    filteredTasks.forEach(task => {
	
		
        const div = document.createElement("div");

        div.className = "task";

        div.innerHTML = `
          ${task.name}
		  <button class="editbtn">edit</button> 
          <button class="deletebtn">delete</button>`;
		  
		  
		const editbtn=div.querySelector(".editbtn");
		editbtn.addEventListener("click",()=>{
			taskInput.value=task.name;
			addBtn.textContent = "edit";
			addBtn.onclick = () => {
			task.name = taskInput.value;
			taskInput.value = "";
			addBtn.textContent = "Add";
			addBtn.onclick = addTask;
			renderTasks();
			};
		});
		
		const deleteBtn = div.querySelector(".deletebtn");
        deleteBtn.addEventListener("click", () => {
            
              const index = tasks.findIndex(t => t.id === task.id);
            
                tasks.splice(index, 1);
            
              renderTasks(tasks);
            
            });
        taskList.appendChild(div);

    });

}
    function addTask(){

      const taskName = taskInput.value;

      tasks.push({
        name: taskName

      });
      taskInput.value="";

      renderTasks();

    }
    function searchTasks(){

      const searchValue =
        searchInput.value.toLowerCase();

      const filtered = tasks.filter(task =>
        task.name
        .toLowerCase()
        .includes(searchValue)

      );

      renderTasks(filtered);

    }
    function clearTasks(){

      tasks = [];

      searchInput.value = "";

      taskList.innerHTML = `<p class="empty">No tasks yet. Add one above!</p>`;
	}
    addBtn.onclick = addTask;

    searchInput.addEventListener("input", searchTasks);

    clearBtn.addEventListener("click", clearTasks);

  </script>

</body>
</html>
